automated_emails:
  - AuthorizationRequestMailer#submit
  - AuthorizationRequestMailer#reopening_submit
  - Instruction::AuthorizationRequestMailer#submit
  - Instruction::AuthorizationRequestMailer#reopening_submit
  - AuthorizationRequestMailer#approve
  - AuthorizationRequestMailer#reopening_approve
  - GDPRContactMailer#responsable_traitement
  - GDPRContactMailer#delegue_protection_donnees
  - FranceConnectMailer#new_scopes
  - AutoGeneratedFranceConnectMailer#approve
  - AutoGeneratedFranceConnectMailer#new_scopes
  - DGFIP::APIMMailer#approve
  - HubEEMailer#administrateur_metier
  - HubEEMailer#administrateur_metier
  - AuthorizationRequestMailer#refuse
  - AuthorizationRequestMailer#reopening_refuse
  - AuthorizationRequestMailer#request_changes
  - AuthorizationRequestMailer#reopening_request_changes
  - AuthorizationRequestMailer#revoke
  - AutoGeneratedFranceConnectMailer#revoke
  - AuthorizationRequestTransferMailer#success

authorization_request_events:
  - submit
  - approve
  - request_changes
  - refuse
  - revoke

# Reusable blocks for the events whose emails never depend on the definition.
shared_event_blocks:
  submit: &submit
    event_name: submit
    authorization_request_states:
      - state:
          reopening: false
        emails:
          - AuthorizationRequestMailer#submit
          - Instruction::AuthorizationRequestMailer#submit
      - state:
          reopening: true
        emails:
          - AuthorizationRequestMailer#reopening_submit
          - Instruction::AuthorizationRequestMailer#reopening_submit

  request_changes: &request_changes
    event_name: request_changes
    authorization_request_states:
      - state:
          reopening: false
        emails:
          - AuthorizationRequestMailer#request_changes
      - state:
          reopening: true
        emails:
          - AuthorizationRequestMailer#reopening_request_changes

  refuse: &refuse
    event_name: refuse
    authorization_request_states:
      - state:
          reopening: false
        emails:
          - AuthorizationRequestMailer#refuse
      - state:
          reopening: true
        emails:
          - AuthorizationRequestMailer#reopening_refuse

  revoke: &revoke
    event_name: revoke
    emails:
      - AuthorizationRequestMailer#revoke

# Full per-definition event lists. They share the blocks above and only differ by the approve recipients.
shared_event_lists:
  basic: &basic
    - *submit
    - event_name: approve
      authorization_request_states:
        - state:
            reopening: false
          emails:
            - AuthorizationRequestMailer#approve
        - state:
            reopening: true
          emails:
            - AuthorizationRequestMailer#reopening_approve
    - *request_changes
    - *refuse
    - *revoke
  with_gdpr: &with_gdpr
    - *submit
    - event_name: approve
      authorization_request_states:
        - state:
            reopening: false
          emails:
            - AuthorizationRequestMailer#approve
            - GDPRContactMailer#delegue_protection_donnees
            - GDPRContactMailer#responsable_traitement
        - state:
            reopening: true
          emails:
            - AuthorizationRequestMailer#reopening_approve
            - GDPRContactMailer#delegue_protection_donnees
            - GDPRContactMailer#responsable_traitement
    - *request_changes
    - *refuse
    - *revoke
  with_gdpr_and_dgfip: &with_gdpr_and_dgfip
    - *submit
    - event_name: approve
      authorization_request_states:
        - state:
            reopening: false
          emails:
            - AuthorizationRequestMailer#approve
            - DGFIP::APIMMailer#approve
            - GDPRContactMailer#delegue_protection_donnees
            - GDPRContactMailer#responsable_traitement
        - state:
            reopening: true
          emails:
            - AuthorizationRequestMailer#reopening_approve
            - DGFIP::APIMMailer#approve
            - GDPRContactMailer#delegue_protection_donnees
            - GDPRContactMailer#responsable_traitement
    - *request_changes
    - *refuse
    - *revoke
  with_gdpr_and_france_connect: &with_gdpr_and_france_connect
    - *submit
    - event_name: approve
      authorization_request_states:
        - state:
            reopening: false
          emails:
            - AuthorizationRequestMailer#approve
            - FranceConnectMailer#new_scopes
            - GDPRContactMailer#delegue_protection_donnees
            - GDPRContactMailer#responsable_traitement
        - state:
            reopening: true
          emails:
            - AuthorizationRequestMailer#reopening_approve
            - FranceConnectMailer#new_scopes
            - GDPRContactMailer#delegue_protection_donnees
            - GDPRContactMailer#responsable_traitement
    - *request_changes
    - *refuse
    - *revoke
  with_hubee: &with_hubee
    - *submit
    - event_name: approve
      authorization_request_states:
        - state:
            reopening: false
          emails:
            - AuthorizationRequestMailer#approve
            - HubEEMailer#administrateur_metier
        - state:
            reopening: true
          emails:
            - AuthorizationRequestMailer#reopening_approve
            - HubEEMailer#administrateur_metier
    - *request_changes
    - *refuse
    - *revoke

