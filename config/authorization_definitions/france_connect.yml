france_connect:
  name: "FranceConnect"
  description: "Identifier les utilisateurs de votre site internet et accéder à certaines données d'identité certifiées."
  provider: "dinum"
  automated_emails:
    - submit_to_applicant
    - submit_to_instructors
    - approve_to_applicant
    - approve_to_responsable_traitement
    - approve_to_delegue_protection_donnees
    - refuse_to_applicant
    - request_changes_to_applicant
    - revoke_to_applicant
  kind: 'service'
  link: "https://franceconnect.gouv.fr/"
  cgu_link: "https://partenaires.franceconnect.gouv.fr/cgu"
  support_email: "support.partenaires@franceconnect.gouv.fr"
  public: true
  features:
    instructor_drafts: true
  blocks:
    - name: "basic_infos"
    - name: "personal_data"
    - name: "legal"
    - name: "france_connect_eidas"
    - name: "scopes"
    - name: "contacts"
  scopes:
    - name: "Nom de naissance"
      value: "family_name"
      group: "Identité pivot"
    - name: "Prénoms"
      value: "given_name"
      group: "Identité pivot"
    - name: "Date de naissance"
      value: "birthdate"
      group: "Identité pivot"
    - name: "Ville de naissance"
      value: "birthplace"
      group: "Identité pivot"
    - name: "Pays de naissance"
      value: "birthcountry"
      group: "Identité pivot"
    - name: "Sexe"
      value: "gender"
      group: "Identité pivot"
    - name: "Nom d'usage"
      value: "preferred_username"
      group: "Autres données"
    - name: "Adresse électronique"
      value: "email"
      group: "Autres données"
    - name: "Identifiant technique"
      value: "openid"
      group: "Données techniques"
      included: true


